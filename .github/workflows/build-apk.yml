name: Build VLC Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        sdkmanager: |
          "platforms;android-34"
          "build-tools;34.0.0"
          "ndk;25.2.9519653"
          "cmake;3.22.1"
        ndk-version: "25.2.9519653"

    - name: Configure local.properties
      run: |
        # 创建或更新 local.properties
        if [ -f "local.properties" ]; then
          echo "local.properties 已存在"
        else
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_ROOT" >> local.properties
        fi
        cat local.properties

    - name: Build APK
      run: |
        echo "=== 开始构建 VLC-Android ==="
        
        # 方法1：尝试使用 Gradle（如果没有 gradlew）
        echo "尝试直接使用 Gradle..."
        cd application
        gradle :app:assembleDebug
        
        # 检查构建结果
        if [ -f "app/build/outputs/apk/debug/*.apk" ]; then
          echo "APK 构建成功！"
          ls -la app/build/outputs/apk/debug/
        else
          echo "标准构建失败，尝试其他方法..."
        fi

    - name: Upload APK artifacts
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: vlc-android-apks
        path: |
          application/app/build/outputs/apk/**/*.apk
          **​/build/outputs/apk/​**/*.apk
        if-no-files-found: warn
        retention-days: 7

    - name: Build report
      if: always()
      run: |
        echo "=== 构建报告 ==="
        echo "项目: VLC-Android"
        echo "时间: $(date)"
        echo "提交: $"
        echo "运行ID: $"
        echo "=== 文件查找 ==="
        find . -name "*.apk" -type f 2>/dev/null | head -10 || echo "未找到 APK 文件"
